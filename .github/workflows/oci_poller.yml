name: OCI 5-Min Capacity Poller

on:
  schedule:
    - cron: '0 0 * * *'  # Safety net to restart the loop once a day if it ever breaks
  workflow_dispatch:     # Trigger manually the FIRST time to kick off the loop

permissions:
  contents: read
  actions: write

jobs:
  run-capacity-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, openssl

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Configure .env File
        run: |
          cp .env.example .env
          sed -i "s|OCI_REGION=.*|OCI_REGION=${{ secrets.OCI_REGION }}|g" .env
          sed -i "s|OCI_USER_ID=.*|OCI_USER_ID=${{ secrets.OCI_USER_ID }}|g" .env
          sed -i "s|OCI_TENANCY_ID=.*|OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}|g" .env
          sed -i "s|OCI_KEY_FINGERPRINT=.*|OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}|g" .env
          sed -i "s|OCI_SUBNET_ID=.*|OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}|g" .env
          sed -i "s|OCI_IMAGE_ID=.*|OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}|g" .env
          sed -i "s|OCI_AVAILABILITY_DOMAIN=.*|OCI_AVAILABILITY_DOMAIN=${{ secrets.OCI_AVAILABILITY_DOMAIN }}|g" .env
          sed -i "s|OCI_SSH_PUBLIC_KEY=.*|OCI_SSH_PUBLIC_KEY=\"${{ secrets.OCI_SSH_PUBLIC_KEY }}\"|g" .env
          sed -i "s|OCI_OCPUS=.*|OCI_OCPUS=2|g" .env
          sed -i "s|OCI_MEMORY_IN_GBS=.*|OCI_MEMORY_IN_GBS=12|g" .env
          sed -i "s|OCI_SHAPE=.*|OCI_SHAPE=VM.Standard.A1.Flex|g" .env
          sed -i "s|OCI_PRIVATE_KEY_FILENAME=.*|OCI_PRIVATE_KEY_FILENAME=oracle_api_key.pem|g" .env

      - name: Inject API Private Key File
        run: |
          printf -- "-----BEGIN RSA PRIVATE KEY-----\n" > oracle_api_key.pem
          printf -- "%s\n" "${{ secrets.OCI_PRIVATE_KEY }}" >> oracle_api_key.pem
          printf -- "-----END RSA PRIVATE KEY-----\n" >> oracle_api_key.pem
          chmod 600 oracle_api_key.pem

      - name: Execute Hitrov OCI Core Script
        run: php index.php

      - name: Loop - Trigger next run after 5 minutes
        if: always() # Ensures loop continuation regardless of script outcome
        run: |
          echo "Waiting 4.5 minutes to account for runner startup overhead..."
          sleep 270
          
          echo "Dispatching next loop execution..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/oci_poller.yml/dispatches \
            -d '{"ref":"'"${{ github.ref_name }}"'"}'
