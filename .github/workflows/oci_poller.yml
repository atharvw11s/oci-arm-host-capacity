name: OCI 5-Min Capacity Poller

on:
  workflow_dispatch:     # Trigger manually from the Actions tab the first time

permissions:
  contents: read
  actions: write

jobs:
  run-capacity-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, openssl

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Configure .env File
        run: |
          cp .env.example .env
          sed -i "s|OCI_REGION=.*|OCI_REGION=${{ secrets.OCI_REGION }}|g" .env
          sed -i "s|OCI_USER_ID=.*|OCI_USER_ID=${{ secrets.OCI_USER_ID }}|g" .env
          sed -i "s|OCI_TENANCY_ID=.*|OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}|g" .env
          sed -i "s|OCI_KEY_FINGERPRINT=.*|OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}|g" .env
          sed -i "s|OCI_SUBNET_ID=.*|OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}|g" .env
          sed -i "s|OCI_IMAGE_ID=.*|OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}|g" .env
          sed -i "s|OCI_AVAILABILITY_DOMAIN=.*|OCI_AVAILABILITY_DOMAIN=${{ secrets.OCI_AVAILABILITY_DOMAIN }}|g" .env
          sed -i "s|OCI_SSH_PUBLIC_KEY=.*|OCI_SSH_PUBLIC_KEY=\"${{ secrets.OCI_SSH_PUBLIC_KEY }}\"|g" .env
          
          # Force your exact custom hardware specs (Ampere 2 OCPU, 12GB RAM)
          sed -i "s|OCI_OCPUS=.*|OCI_OCPUS=2|g" .env
          sed -i "s|OCI_MEMORY_IN_GBS=.*|OCI_MEMORY_IN_GBS=12|g" .env
          sed -i "s|OCI_SHAPE=.*|OCI_SHAPE=VM.Standard.A1.Flex|g" .env
          sed -i "s|OCI_PRIVATE_KEY_FILENAME=.*|OCI_PRIVATE_KEY_FILENAME=oracle_api_key.pem|g" .env

      - name: Inject API Private Key File
        run: |
          echo "-----BEGIN RSA PRIVATE KEY-----" > oracle_api_key.pem
          echo "${{ secrets.OCI_PRIVATE_KEY }}" >> oracle_api_key.pem
          echo "-----END RSA PRIVATE KEY-----" >> oracle_api_key.pem
          chmod 600 oracle_api_key.pem

      - name: Execute Hitrov OCI Core Script
        id: oci_script
        run: |
          # Run the script and capture the logs
          OUTPUT=$(php index.php 2>&1)
          echo "--- OCI SCRIPT OUTPUT ---"
          echo "$OUTPUT"
          echo "-------------------------"
          
          # Parse the output to determine our loop state
          if echo "$OUTPUT" | grep -iq "Out of host capacity"; then
            echo "RESULT=retry" >> $GITHUB_OUTPUT
          elif echo "$OUTPUT" | grep -iq "Already have an instance"; then
            echo "RESULT=already_exists" >> $GITHUB_OUTPUT
          elif echo "$OUTPUT" | grep -iq "error" || echo "$OUTPUT" | grep -iq "Exception"; then
            echo "RESULT=api_error" >> $GITHUB_OUTPUT
          else
            echo "RESULT=success" >> $GITHUB_OUTPUT
          fi

      - name: Send Success Notification to Discord
        if: steps.oci_script.outputs.RESULT == 'success'
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "🎉 **SUCCESS! Oracle VM Created!**\nYour Always Free Ampere Instance (**2 OCPUs, 12GB RAM**) has been successfully provisioned! Loop terminated. 🚀"}' \
               ${{ secrets.DISCORD_WEBHOOK }}

      - name: Send Alert for Pre-existing Instance
        if: steps.oci_script.outputs.RESULT == 'already_exists'
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "ℹ️ **Poller Stopped:** An instance with this shape already exists in your account. Terminating loop."}' \
               ${{ secrets.DISCORD_WEBHOOK }}

      - name: Loop - Trigger next run after 5 minutes
        # This condition ensures the loop ONLY fires again if it failed due to capacity or API hiccups
        if: always() && (steps.oci_script.outputs.RESULT == 'retry' || steps.oci_script.outputs.RESULT == 'api_error')
        run: |
          echo "Instance not created yet. Waiting 5 minutes before queueing the next attempt..."
          sleep 300
          
          WORKFLOW_FILE="main.yml"
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE/dispatches \
            -d '{"ref":"'"${{ github.ref_name }}"'"}'
