name: OCI 24-7 Capacity Poller

on:
  workflow_dispatch:     # Triggered externally via cron-job.org

permissions:
  contents: read
  actions: write         # Crucial: Allows the script to disable/enable itself

jobs:
  run-capacity-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, openssl

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Configure .env File
        run: |
          cp .env.example .env
          sed -i "s|OCI_REGION=.*|OCI_REGION=${{ secrets.OCI_REGION }}|g" .env
          sed -i "s|OCI_USER_ID=.*|OCI_USER_ID=${{ secrets.OCI_USER_ID }}|g" .env
          sed -i "s|OCI_TENANCY_ID=.*|OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}|g" .env
          sed -i "s|OCI_KEY_FINGERPRINT=.*|OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}|g" .env
          sed -i "s|OCI_SUBNET_ID=.*|OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}|g" .env
          sed -i "s|OCI_IMAGE_ID=.*|OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}|g" .env
          sed -i "s|OCI_AVAILABILITY_DOMAIN=.*|OCI_AVAILABILITY_DOMAIN=${{ secrets.OCI_AVAILABILITY_DOMAIN }}|g" .env
          sed -i "s|OCI_SSH_PUBLIC_KEY=.*|OCI_SSH_PUBLIC_KEY=\"${{ secrets.OCI_SSH_PUBLIC_KEY }}\"|g" .env
          
          # Force hardware specs (Ampere 2 OCPU, 12GB RAM)
          sed -i "s|OCI_OCPUS=.*|OCI_OCPUS=2|g" .env
          sed -i "s|OCI_MEMORY_IN_GBS=.*|OCI_MEMORY_IN_GBS=12|g" .env
          sed -i "s|OCI_SHAPE=.*|OCI_SHAPE=VM.Standard.A1.Flex|g" .env
          sed -i "s|OCI_PRIVATE_KEY_FILENAME=.*|OCI_PRIVATE_KEY_FILENAME=oracle_api_key.pem|g" .env

      - name: Inject API Private Key File
        run: |
          echo "-----BEGIN RSA PRIVATE KEY-----" > oracle_api_key.pem
          echo "${{ secrets.OCI_PRIVATE_KEY }}" >> oracle_api_key.pem
          echo "-----END RSA PRIVATE KEY-----" >> oracle_api_key.pem
          chmod 600 oracle_api_key.pem

      - name: Execute Hitrov OCI Core Script
        id: oci_script
        run: |
          OUTPUT=$(php index.php 2>&1)
          echo "--- OCI SCRIPT OUTPUT ---"
          echo "$OUTPUT"
          echo "-------------------------"
          
          if echo "$OUTPUT" | grep -iq "Out of host capacity"; then
            echo "RESULT=retry" >> $GITHUB_OUTPUT
          elif echo "$OUTPUT" | grep -iq "Already have an instance"; then
            echo "RESULT=already_exists" >> $GITHUB_OUTPUT
          elif echo "$OUTPUT" | grep -iq "TooManyRequests" || echo "$OUTPUT" | grep -iq "Too many requests" || echo "$OUTPUT" | grep -iq "429"; then
            echo "RESULT=cooldown" >> $GITHUB_OUTPUT
          elif echo "$OUTPUT" | grep -iq "error" || echo "$OUTPUT" | grep -iq "Exception"; then
            echo "RESULT=api_error" >> $GITHUB_OUTPUT
          else
            echo "RESULT=success" >> $GITHUB_OUTPUT
          fi

      - name: Send Success Notification to Discord
        if: steps.oci_script.outputs.RESULT == 'success'
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "🎉 **SUCCESS! Oracle VM Created!**\nYour Always Free Ampere Instance (**2 OCPUs, 12GB RAM**) has been successfully provisioned! 🚀"}' \
               ${{ secrets.DISCORD_WEBHOOK }}

      - name: Send Alert for Pre-existing Instance
        if: steps.oci_script.outputs.RESULT == 'already_exists'
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "ℹ️ **Poller Stopped:** An instance with this shape already exists in your account. Self-destructing..."}' \
               ${{ secrets.DISCORD_WEBHOOK }}

      - name: Send Cooldown Alert to Discord
        if: steps.oci_script.outputs.RESULT == 'cooldown'
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "⏳ **Oracle Cooldown Detected:** Hit rate limit. Pausing sniper loop for 15 minutes to clear throttling..."}' \
               ${{ secrets.DISCORD_WEBHOOK }}

      - name: ⏳ Handle Oracle Cooldown (15-Min Timeout)
        if: always() && steps.oci_script.outputs.RESULT == 'cooldown'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Throttling detected. Temporarily disabling workflow to block incoming cron triggers..."
          gh workflow disable oci_poller.yml
          
          echo "Sleeping for 15 minutes (900 seconds) to cool down API..."
          sleep 900
          
          echo "Cooldown over. Re-enabling workflow for cron-job.org..."
          gh workflow enable oci_poller.yml

      - name: 🛑 Shut Down Sniper Permanently
        if: always() && (steps.oci_script.outputs.RESULT == 'success' || steps.oci_script.outputs.RESULT == 'already_exists')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Instance detected or successfully created! Shutting down the automation loop permanently..."
          gh workflow disable oci_poller.yml
